<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      G00472883
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Blank</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-searchbar placeholder="Movie Name" [(ngModel)]="keyword"></ion-searchbar>
  <ion-button expand="full" (click)="searchMovies()">Search</ion-button>
  <h4>Today's Trending Movies</h4>
  <!-- Ion card should appear/disappear depending on search results -->
  <ion-card *ngFor="let movie of trendingMovies" (click)="getMovieDetails()">
    <img alt="{{movie.title}}" src="http://image.tmdb.org/t/p/w185/{{movie.poster_path}}" />
    <ion-card-header>
      <ion-card-title>{{movie.title}}</ion-card-title>
      <ion-card-subtitle>{{movie.adult}}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      {{movie.overview}}
    </ion-card-content>
  </ion-card>
</ion-content>
