<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      G00472883
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Blank</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-searchbar placeholder="Movie Name"></ion-searchbar>
  <ion-button expand="full" (click)="openMovies()">Search</ion-button>
  <h4>Today's Trending Movies</h4>
  <ion-list>
    <ion-item *ngFor="let movie of trendingMovies">
      <ion-label>{{movie.title}}</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
